version: "3.9"

services:
  chilife-agent:
    build: .
    image: chilife-agent:local
    container_name: chilife-agent
    ports:
      - "8501:8501"
    volumes:
      # Persists SQLite across container restarts.
      # In Azure this is an Azure Files share mounted at /data.
      - chilife_db:/data
    environment:
      - APP_ENV=local
      - SQLITE_DIR=/data
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
    restart: unless-stopped

volumes:
  chilife_db:
